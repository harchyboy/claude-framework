# squid.conf — Network restrictions for Claude Code agents
# Only allows traffic to approved domains. Everything else is blocked.
#
# Used by docker-compose.yml to restrict agent network access.

# ACL definitions
acl localnet src 172.16.0.0/12
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Approved domains — agents can only reach these
acl approved_domains dstdomain .github.com
acl approved_domains dstdomain .githubusercontent.com
acl approved_domains dstdomain .npmjs.org
acl approved_domains dstdomain .npmjs.com
acl approved_domains dstdomain registry.npmjs.org
acl approved_domains dstdomain .anthropic.com
acl approved_domains dstdomain api.anthropic.com
acl approved_domains dstdomain .pypi.org
acl approved_domains dstdomain pypi.org
acl approved_domains dstdomain files.pythonhosted.org
acl approved_domains dstdomain .supabase.co
acl approved_domains dstdomain .supabase.com
acl approved_domains dstdomain .vercel.app
acl approved_domains dstdomain .netlify.app

# Allow approved domains only
http_access allow localnet approved_domains
http_access allow localhost approved_domains

# Block everything else
http_access deny all

# Proxy port
http_port 3128

# Minimal logging
access_log none
cache_log /dev/null

# Performance
maximum_object_size 50 MB
cache_mem 256 MB
